  <!-- Separator before pooled -->
  <line x1="20" y1="775" x2="880" y2="775" stroke="#0B3C5D" stroke-width="2"/>

  <!-- Pooled estimate diamond: 14.7% [11.2, 18.9] -->
  <text x="28" y="797" font-size="14" font-weight="bold">Pooled Estimate</text>
  <!-- Diamond at 14.7%, CI 11.2-18.9 -->
  <!-- 14.7% -> x=320+14.7*8.4=443.5, 11.2->414, 18.9->479 -->
  <polygon points="414,793 443,783 479,793 443,803" fill="#0F9D8A" stroke="#0B3C5D" stroke-width="2"/>
  <text x="755" y="797" font-size="14" font-weight="bold" text-anchor="start">14.7 [11.2, 18.9]</text>

  <!-- Dashed line at pooled estimate -->
  <line x1="443" y1="72" x2="443" y2="800" stroke="#E74C3C" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Heterogeneity stats -->
  <text x="28" y="835" font-size="14" font-weight="bold" fill="#0B3C5D">Heterogeneity: I² = 94.3%, p &lt; 0.001</text>

  <!-- Footnote -->
  <text x="450" y="880" text-anchor="middle" font-size="13" font-style="italic" fill="#666">Note: Aggregated values are simulated (^S) for demonstration.</text>
