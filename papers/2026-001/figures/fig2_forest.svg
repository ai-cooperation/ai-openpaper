<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0B3C5D">Figure 2. Forest Plot: LLM Hallucination Rates Across Studies</text>

  <!-- Column Headers -->
  <text x="30" y="58" font-size="14" font-weight="bold" fill="#0B3C5D">Study</text>
  <text x="520" y="58" font-size="16" font-weight="bold" fill="#0B3C5D" text-anchor="middle">Hallucination Rate (%)</text>
  <text x="820" y="58" font-size="14" font-weight="bold" fill="#0B3C5D" text-anchor="middle">Rate [95% CI]</text>

  <!-- Separator line -->
  <line x1="20" y1="66" x2="880" y2="66" stroke="#0B3C5D" stroke-width="2"/>

  <!-- Plot area: x=300..700, mapped 0..80% -->
  <!-- Scale: 1% = (700-300)/80 = 5px -->
  <!-- Gridlines -->
  <line x1="300" y1="70" x2="300" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="350" y1="70" x2="350" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="400" y1="70" x2="400" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="450" y1="70" x2="450" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="500" y1="70" x2="500" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="550" y1="70" x2="550" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="600" y1="70" x2="600" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="650" y1="70" x2="650" y2="485" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="700" y1="70" x2="700" y2="485" stroke="#E5E7EB" stroke-width="1"/>

  <!-- X-axis labels (0, 10, 20, 30, 40, 50, 60, 70, 80) -->
  <text x="300" y="505" text-anchor="middle" font-size="14">0</text>
  <text x="350" y="505" text-anchor="middle" font-size="14">10</text>
  <text x="400" y="505" text-anchor="middle" font-size="14">20</text>
  <text x="450" y="505" text-anchor="middle" font-size="14">30</text>
  <text x="500" y="505" text-anchor="middle" font-size="14">40</text>
  <text x="550" y="505" text-anchor="middle" font-size="14">50</text>
  <text x="600" y="505" text-anchor="middle" font-size="14">60</text>
  <text x="650" y="505" text-anchor="middle" font-size="14">70</text>
  <text x="700" y="505" text-anchor="middle" font-size="14">80</text>
  <text x="500" y="528" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Hallucination Rate (%)</text>

  <!-- 14 studies sorted ascending by rate. Row spacing=26px, start y=88 -->
  <!-- Scale: x = 300 + rate * 5 -->

  <!-- Study 1: Asgari2025: 1.47% — small study, CI approx [0.3, 7.0] -->
  <text x="28" y="88" font-size="14">Asgari et al. (2025)</text>
  <line x1="302" y1="84" x2="335" y2="84" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="302" y1="79" x2="302" y2="89" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="335" y1="79" x2="335" y2="89" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="305" y="80" width="7" height="8" fill="#0B3C5D"/>
  <text x="745" y="88" font-size="14" text-anchor="start">1.47</text>

  <!-- Study 2: Hasnain2025: 10.0% [5.2, 18.5] -->
  <text x="28" y="114" font-size="14">Hasnain et al. (2025)</text>
  <line x1="326" y1="110" x2="393" y2="110" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="326" y1="105" x2="326" y2="115" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="393" y1="105" x2="393" y2="115" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="347" y="106" width="8" height="8" fill="#0B3C5D"/>
  <text x="745" y="114" font-size="14" text-anchor="start">10.0</text>

  <!-- Study 3: Yoon2025: 12.47% [8.1, 18.7] -->
  <text x="28" y="140" font-size="14">Yoon et al. (2025)</text>
  <line x1="341" y1="136" x2="394" y2="136" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="341" y1="131" x2="341" y2="141" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="394" y1="131" x2="394" y2="141" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="360" y="132" width="8" height="8" fill="#0B3C5D"/>
  <text x="745" y="140" font-size="14" text-anchor="start">12.47</text>

  <!-- Study 4: Moayeri2024: 15.0% [9.0, 24.0] -->
  <text x="28" y="166" font-size="14">Moayeri et al. (2024)</text>
  <line x1="345" y1="162" x2="420" y2="162" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="345" y1="157" x2="345" y2="167" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="420" y1="157" x2="420" y2="167" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="373" y="158" width="8" height="8" fill="#0B3C5D"/>
  <text x="745" y="166" font-size="14" text-anchor="start">15.0</text>

  <!-- Study 5: Loi2024: 15.8% [10.2, 23.7] -->
  <text x="28" y="192" font-size="14">Loi et al. (2024)</text>
  <line x1="351" y1="188" x2="419" y2="188" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="351" y1="183" x2="351" y2="193" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="419" y1="183" x2="419" y2="193" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="379" y="184" width="8" height="8" fill="#0B3C5D"/>
  <text x="745" y="192" font-size="14" text-anchor="start">15.8</text>

  <!-- Study 6: Molli2026: 26.5% [18.5, 36.2] -->
  <text x="28" y="218" font-size="14">Molli et al. (2026)</text>
  <line x1="393" y1="214" x2="481" y2="214" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="393" y1="209" x2="393" y2="219" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="481" y1="209" x2="481" y2="219" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="430" y="210" width="9" height="8" fill="#0B3C5D"/>
  <text x="745" y="218" font-size="14" text-anchor="start">26.5</text>

  <!-- Study 7: Min2023: 28.4% [20.1, 38.4] -->
  <text x="28" y="244" font-size="14">Min et al. (2023)</text>
  <line x1="401" y1="240" x2="492" y2="240" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="401" y1="235" x2="401" y2="245" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="492" y1="235" x2="492" y2="245" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="442" y="236" width="9" height="8" fill="#0B3C5D"/>
  <text x="745" y="244" font-size="14" text-anchor="start">28.4</text>

  <!-- Study 8: Gui2025: 28.57% [20.3, 38.5] -->
  <text x="28" y="270" font-size="14">Gui et al. (2025)</text>
  <line x1="402" y1="266" x2="493" y2="266" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="402" y1="261" x2="402" y2="271" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="493" y1="261" x2="493" y2="271" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="443" y="262" width="9" height="8" fill="#0B3C5D"/>
  <text x="745" y="270" font-size="14" text-anchor="start">28.57</text>

  <!-- Study 9: Fernandez2025: 31.0% [22.1, 41.4] -->
  <text x="28" y="296" font-size="14">Fernandez et al. (2025)</text>
  <line x1="411" y1="292" x2="507" y2="292" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="411" y1="287" x2="411" y2="297" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="507" y1="287" x2="507" y2="297" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="455" y="288" width="9" height="8" fill="#0B3C5D"/>
  <text x="745" y="296" font-size="14" text-anchor="start">31.0</text>

  <!-- Study 10: Li2023: 38.0% [28.0, 49.0] -->
  <text x="28" y="322" font-size="14">Li et al. (2023)</text>
  <line x1="440" y1="318" x2="545" y2="318" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="440" y1="313" x2="440" y2="323" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="545" y1="313" x2="545" y2="323" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="488" y="314" width="9" height="8" fill="#0B3C5D"/>
  <text x="745" y="322" font-size="14" text-anchor="start">38.0</text>

  <!-- Study 11: Lin2022: 42.0% [32.0, 52.5] -->
  <text x="28" y="348" font-size="14">Lin et al. (2022)</text>
  <line x1="460" y1="344" x2="563" y2="344" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="460" y1="339" x2="460" y2="349" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="563" y1="339" x2="563" y2="349" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="510" y="340" width="9" height="8" fill="#0B3C5D"/>
  <text x="745" y="348" font-size="14" text-anchor="start">42.0</text>

  <!-- Study 12: Semnani2023 (GPT-4): 42.9% [33.0, 53.4] -->
  <text x="28" y="374" font-size="14">Semnani et al. (2023)</text>
  <line x1="465" y1="370" x2="567" y2="370" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="465" y1="365" x2="465" y2="375" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="567" y1="365" x2="567" y2="375" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="515" y="366" width="9" height="8" fill="#0B3C5D"/>
  <text x="745" y="374" font-size="14" text-anchor="start">42.9</text>

  <!-- Study 13: Athaluri2023: 47.0% [36.5, 57.8] -->
  <text x="28" y="400" font-size="14">Athaluri et al. (2023)</text>
  <line x1="483" y1="396" x2="589" y2="396" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="483" y1="391" x2="483" y2="401" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="589" y1="391" x2="589" y2="401" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="535" y="392" width="9" height="8" fill="#0B3C5D"/>
  <text x="745" y="400" font-size="14" text-anchor="start">47.0</text>

  <!-- Study 14: Rahman2025: 65.0% [53.0, 75.5] -->
  <text x="28" y="426" font-size="14">Rahman et al. (2025)</text>
  <line x1="565" y1="422" x2="678" y2="422" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="565" y1="417" x2="565" y2="427" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="678" y1="417" x2="678" y2="427" stroke="#0B3C5D" stroke-width="2"/>
  <rect x="623" y="418" width="10" height="8" fill="#0B3C5D"/>
  <text x="745" y="426" font-size="14" text-anchor="start">65.0</text>

  <!-- Separator before pooled -->
  <line x1="20" y1="445" x2="880" y2="445" stroke="#0B3C5D" stroke-width="2"/>

  <!-- Pooled estimate diamond: 25.0% [16.3, 36.3] -->
  <text x="28" y="468" font-size="14" font-weight="bold">Pooled Estimate</text>
  <!-- 25.0% -> x=300+25*5=425, 16.3->382, 36.3->482 -->
  <polygon points="382,464 425,454 482,464 425,474" fill="#0F9D8A" stroke="#0B3C5D" stroke-width="2"/>
  <text x="745" y="468" font-size="14" font-weight="bold" text-anchor="start">25.0 [16.3, 36.3]</text>

  <!-- Dashed line at pooled estimate 25% -> x=425 -->
  <line x1="425" y1="70" x2="425" y2="480" stroke="#E74C3C" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Heterogeneity stats -->
  <text x="28" y="500" font-size="14" font-weight="bold" fill="#0B3C5D">Heterogeneity: I&#178; = 98.2%, &#964;&#178; = 1.24, p &lt; 0.001</text>

  <!-- Footnote -->
  <text x="450" y="545" text-anchor="middle" font-size="13" font-style="italic" fill="#666666">Note: k = 14 studies with extractable quantitative rates. Values from original published studies.</text>

  <!-- X-axis bottom line -->
  <line x1="300" y1="485" x2="700" y2="485" stroke="#0B3C5D" stroke-width="2"/>
</svg>