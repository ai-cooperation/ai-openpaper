<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: bold; fill: #0B3C5D; }
      .study-label { font-size: 11px; fill: #333; }
      .stat-label { font-size: 11px; fill: #333; text-anchor: end; }
      .axis-label { font-size: 12px; fill: #0B3C5D; font-weight: bold; }
      .axis-tick { font-size: 10px; fill: #555; }
      .grid { stroke: #E5E7EB; stroke-width: 0.5; }
      .ci-line { stroke: #0B3C5D; stroke-width: 1.5; }
      .pooled-line { stroke: #0B3C5D; stroke-width: 1; stroke-dasharray: 5,4; }
      .heterogeneity { font-size: 10px; fill: #555; font-style: italic; }
      .note { font-size: 10px; fill: #777; font-style: italic; }
      .header { font-size: 11px; font-weight: bold; fill: #0B3C5D; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Forest Plot: Hallucination Rates Across Studies</text>

  <!-- Column Headers -->
  <text x="20" y="58" class="header">Study</text>
  <text x="660" y="58" class="header" text-anchor="end">Rate (95% CI)</text>
  <text x="780" y="58" class="header" text-anchor="end">Weight</text>
  <line x1="15" y1="64" x2="790" y2="64" stroke="#0B3C5D" stroke-width="1"/>

  <!-- Plot area: x=290..620 maps to 0%..50% -->
  <!-- Scale: each 1% = (620-290)/50 = 6.6px -->
  <!-- y starts at 80, each row = 38px -->

  <!-- Grid lines -->
  <line x1="290" y1="68" x2="290" y2="845" class="grid"/>
  <line x1="356" y1="68" x2="356" y2="845" class="grid"/>
  <line x1="422" y1="68" x2="422" y2="845" class="grid"/>
  <line x1="488" y1="68" x2="488" y2="845" class="grid"/>
  <line x1="554" y1="68" x2="554" y2="845" class="grid"/>
  <line x1="620" y1="68" x2="620" y2="845" class="grid"/>

  <!-- Pooled estimate dashed line at 14.7% => 290 + 14.7*6.6 = 387 -->
  <line x1="387" y1="68" x2="387" y2="845" class="pooled-line"/>

  <!-- Studies (20 studies, sorted by effect size) -->
  <!-- Study data: name, rate, ci_low, ci_high, weight -->
  <!-- Row function: y = 80 + i*38 -->
  <!-- x(rate) = 290 + rate * 6.6 -->

  <!-- 1. Rawte et al., 2023 — 1.5% (0.3-7.2) w=2.1% -->
  <text x="20" y="92" class="study-label">Rawte et al., 2023</text>
  <line x1="292" y1="88" x2="338" y2="88" class="ci-line"/>
  <rect x="297" y="84" width="7" height="7" fill="#0B3C5D"/>
  <text x="660" y="92" class="stat-label">1.5 (0.3, 7.2)^S^</text>
  <text x="780" y="92" class="stat-label">2.1%</text>

  <!-- 2. Liu et al., 2024 — 3.8% (1.9-7.4) w=4.2% -->
  <text x="20" y="130" class="study-label">Liu et al., 2024</text>
  <line x1="303" y1="126" x2="339" y2="126" class="ci-line"/>
  <rect x="312" y="121" width="9" height="9" fill="#0B3C5D"/>
  <text x="660" y="130" class="stat-label">3.8 (1.9, 7.4)^S^</text>
  <text x="780" y="130" class="stat-label">4.2%</text>

  <!-- 3. Zhang & Wang, 2024 — 5.2% (2.8-9.4) w=5.0% -->
  <text x="20" y="168" class="study-label">Zhang &amp; Wang, 2024</text>
  <line x1="308" y1="164" x2="352" y2="164" class="ci-line"/>
  <rect x="323" y="159" width="9" height="9" fill="#0B3C5D"/>
  <text x="660" y="168" class="stat-label">5.2 (2.8, 9.4)^S^</text>
  <text x="780" y="168" class="stat-label">5.0%</text>

  <!-- 4. Chen et al., 2024 — 7.1% (4.3-11.5) w=5.8% -->
  <text x="20" y="206" class="study-label">Chen et al., 2024</text>
  <line x1="318" y1="202" x2="366" y2="202" class="ci-line"/>
  <rect x="336" y="197" width="10" height="10" fill="#0B3C5D"/>
  <text x="660" y="206" class="stat-label">7.1 (4.3, 11.5)^S^</text>
  <text x="780" y="206" class="stat-label">5.8%</text>

  <!-- 5. Park et al., 2024 — 8.3% (5.1-13.2) w=5.5% -->
  <text x="20" y="244" class="study-label">Park et al., 2024</text>
  <line x1="324" y1="240" x2="377" y2="240" class="ci-line"/>
  <rect x="344" y="235" width="10" height="10" fill="#0B3C5D"/>
  <text x="660" y="244" class="stat-label">8.3 (5.1, 13.2)^S^</text>
  <text x="780" y="244" class="stat-label">5.5%</text>

  <!-- 6. Thompson et al., 2024 — 9.6% (6.2-14.5) w=6.1% -->
  <text x="20" y="282" class="study-label">Thompson et al., 2024</text>
  <line x1="331" y1="278" x2="386" y2="278" class="ci-line"/>
  <rect x="352" y="273" width="11" height="11" fill="#0B3C5D"/>
  <text x="660" y="282" class="stat-label">9.6 (6.2, 14.5)^S^</text>
  <text x="780" y="282" class="stat-label">6.1%</text>

  <!-- 7. Huang et al., 2023 — 10.8% (7.0-16.3) w=5.9% -->
  <text x="20" y="320" class="study-label">Huang et al., 2023</text>
  <line x1="336" y1="316" x2="398" y2="316" class="ci-line"/>
  <rect x="361" y="311" width="10" height="10" fill="#0B3C5D"/>
  <text x="660" y="320" class="stat-label">10.8 (7.0, 16.3)^S^</text>
  <text x="780" y="320" class="stat-label">5.9%</text>

  <!-- 8. Dahl et al., 2024 — 11.5% (7.4-17.4) w=5.7% -->
  <text x="20" y="358" class="study-label">Dahl et al., 2024</text>
  <line x1="339" y1="354" x2="405" y2="354" class="ci-line"/>
  <rect x="366" y="349" width="10" height="10" fill="#0B3C5D"/>
  <text x="660" y="358" class="stat-label">11.5 (7.4, 17.4)^S^</text>
  <text x="780" y="358" class="stat-label">5.7%</text>

  <!-- 9. Kim et al., 2024 — 12.9% (8.5-19.1) w=5.6% -->
  <text x="20" y="396" class="study-label">Kim et al., 2024</text>
  <line x1="346" y1="392" x2="416" y2="392" class="ci-line"/>
  <rect x="375" y="387" width="10" height="10" fill="#0B3C5D"/>
  <text x="660" y="396" class="stat-label">12.9 (8.5, 19.1)^S^</text>
  <text x="780" y="396" class="stat-label">5.6%</text>

  <!-- 10. Agrawal et al., 2024 — 14.2% (9.8-20.1) w=6.0% -->
  <text x="20" y="434" class="study-label">Agrawal et al., 2024</text>
  <line x1="355" y1="430" x2="423" y2="430" class="ci-line"/>
  <rect x="383" y="425" width="11" height="11" fill="#0B3C5D"/>
  <text x="660" y="434" class="stat-label">14.2 (9.8, 20.1)^S^</text>
  <text x="780" y="434" class="stat-label">6.0%</text>

  <!-- 11. Manakul et al., 2023 — 15.1% (10.2-21.8) w=5.4% -->
  <text x="20" y="472" class="study-label">Manakul et al., 2023</text>
  <line x1="357" y1="468" x2="434" y2="468" class="ci-line"/>
  <rect x="390" y="463" width="10" height="10" fill="#0B3C5D"/>
  <text x="660" y="472" class="stat-label">15.1 (10.2, 21.8)^S^</text>
  <text x="780" y="472" class="stat-label">5.4%</text>

  <!-- 12. Ji et al., 2023 — 16.8% (11.5-23.8) w=5.3% -->
  <text x="20" y="510" class="study-label">Ji et al., 2023</text>
  <line x1="366" y1="506" x2="447" y2="506" class="ci-line"/>
  <rect x="401" y="501" width="9" height="9" fill="#0B3C5D"/>
  <text x="660" y="510" class="stat-label">16.8 (11.5, 23.8)^S^</text>
  <text x="780" y="510" class="stat-label">5.3%</text>

  <!-- 13. Min et al., 2023 — 18.4% (12.3-26.5) w=4.9% -->
  <text x="20" y="548" class="study-label">Min et al., 2023</text>
  <line x1="371" y1="544" x2="465" y2="544" class="ci-line"/>
  <rect x="411" y="540" width="9" height="9" fill="#0B3C5D"/>
  <text x="660" y="548" class="stat-label">18.4 (12.3, 26.5)^S^</text>
  <text x="780" y="548" class="stat-label">4.9%</text>

  <!-- 14. Umapathi et al., 2023 — 20.3% (14.1-28.3) w=4.7% -->
  <text x="20" y="586" class="study-label">Umapathi et al., 2023</text>
  <line x1="383" y1="582" x2="477" y2="582" class="ci-line"/>
  <rect x="424" y="578" width="9" height="9" fill="#0B3C5D"/>
  <text x="660" y="586" class="stat-label">20.3 (14.1, 28.3)^S^</text>
  <text x="780" y="586" class="stat-label">4.7%</text>

  <!-- 15. Nori et al., 2023 — 22.7% (15.8-31.4) w=4.5% -->
  <text x="20" y="624" class="study-label">Nori et al., 2023</text>
  <line x1="394" y1="620" x2="497" y2="620" class="ci-line"/>
  <rect x="440" y="616" width="8" height="8" fill="#0B3C5D"/>
  <text x="660" y="624" class="stat-label">22.7 (15.8, 31.4)^S^</text>
  <text x="780" y="624" class="stat-label">4.5%</text>

  <!-- 16. Sallam, 2023 — 25.1% (17.4-34.7) w=4.0% -->
  <text x="20" y="662" class="study-label">Sallam, 2023</text>
  <line x1="405" y1="658" x2="519" y2="658" class="ci-line"/>
  <rect x="456" y="655" width="8" height="8" fill="#0B3C5D"/>
  <text x="660" y="662" class="stat-label">25.1 (17.4, 34.7)^S^</text>
  <text x="780" y="662" class="stat-label">4.0%</text>

  <!-- 17. Peng et al., 2023 — 28.6% (19.8-39.3) w=3.5% -->
  <text x="20" y="700" class="study-label">Peng et al., 2023</text>
  <line x1="421" y1="696" x2="549" y2="696" class="ci-line"/>
  <rect x="479" y="693" width="7" height="7" fill="#0B3C5D"/>
  <text x="660" y="700" class="stat-label">28.6 (19.8, 39.3)^S^</text>
  <text x="780" y="700" class="stat-label">3.5%</text>

  <!-- 18. Alkaissi & McFarlane, 2023 — 33.2% (23.1-44.9) w=3.0% -->
  <text x="20" y="738" class="study-label">Alkaissi &amp; McFarlane, 2023</text>
  <line x1="443" y1="734" x2="586" y2="734" class="ci-line"/>
  <rect x="509" y="732" width="7" height="7" fill="#0B3C5D"/>
  <text x="660" y="738" class="stat-label">33.2 (23.1, 44.9)^S^</text>
  <text x="780" y="738" class="stat-label">3.0%</text>

  <!-- 19. Athaluri et al., 2023 — 37.5% (26.4-49.9) w=2.5% -->
  <text x="20" y="776" class="study-label">Athaluri et al., 2023</text>
  <line x1="464" y1="772" x2="619" y2="772" class="ci-line"/>
  <rect x="537" y="770" width="6" height="6" fill="#0B3C5D"/>
  <text x="660" y="776" class="stat-label">37.5 (26.4, 49.9)^S^</text>
  <text x="780" y="776" class="stat-label">2.5%</text>

  <!-- 20. Guerreiro et al., 2023 — 42.9% (30.6-56.1) w=2.3% -->
  <text x="20" y="814" class="study-label">Guerreiro et al., 2023</text>
  <line x1="492" y1="810" x2="660" y2="810" class="ci-line"/>
  <rect x="573" y="808" width="6" height="6" fill="#0B3C5D"/>
  <text x="660" y="814" class="stat-label">42.9 (30.6, 56.1)^S^</text>
  <text x="780" y="814" class="stat-label">2.3%</text>

  <!-- Separator -->
  <line x1="15" y1="830" x2="790" y2="830" stroke="#0B3C5D" stroke-width="1"/>

  <!-- Pooled estimate diamond at 14.7% (11.2-18.9) -->
  <text x="20" y="855" class="study-label" font-weight="bold">Pooled estimate (Random effects)</text>
  <polygon points="364,850 387,840 410,850 387,860" fill="#0F9D8A" stroke="#0B3C5D" stroke-width="1.5"/>
  <text x="660" y="855" class="stat-label" font-weight="bold">14.7 (11.2, 18.9)^S^</text>
  <text x="780" y="855" class="stat-label" font-weight="bold">100%</text>

  <!-- X-axis -->
  <line x1="290" y1="875" x2="620" y2="875" stroke="#0B3C5D" stroke-width="1"/>
  <text x="290" y="895" text-anchor="middle" class="axis-tick">0%</text>
  <text x="356" y="895" text-anchor="middle" class="axis-tick">10%</text>
  <text x="422" y="895" text-anchor="middle" class="axis-tick">20%</text>
  <text x="488" y="895" text-anchor="middle" class="axis-tick">30%</text>
  <text x="554" y="895" text-anchor="middle" class="axis-tick">40%</text>
  <text x="620" y="895" text-anchor="middle" class="axis-tick">50%</text>
  <line x1="290" y1="875" x2="290" y2="880" stroke="#0B3C5D" stroke-width="1"/>
  <line x1="356" y1="875" x2="356" y2="880" stroke="#0B3C5D" stroke-width="1"/>
  <line x1="422" y1="875" x2="422" y2="880" stroke="#0B3C5D" stroke-width="1"/>
  <line x1="488" y1="875" x2="488" y2="880" stroke="#0B3C5D" stroke-width="1"/>
  <line x1="554" y1="875" x2="554" y2="880" stroke="#0B3C5D" stroke-width="1"/>
  <line x1="620" y1="875" x2="620" y2="880" stroke="#0B3C5D" stroke-width="1"/>
  <text x="455" y="915" text-anchor="middle" class="axis-label">Hallucination Rate (%)</text>

  <!-- Heterogeneity stats -->
  <text x="20" y="945" class="heterogeneity">Heterogeneity: I&#xB2; = 94.3%, Q = 614.2, df = 19, p &lt; 0.001; Random-effects model (DerSimonian-Laird)</text>

  <!-- Note -->
  <text x="20" y="965" class="note">Note: Values marked with ^S^ are simulated for demonstration purposes.</text>
</svg>