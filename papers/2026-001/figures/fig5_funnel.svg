<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0B3C5D">Figure 5. Funnel Plot for Publication Bias Assessment</text>

  <!-- Plot area: x=120..820, y=55..480 -->
  <!-- X-axis: Hallucination Rate 0-80%, Scale: 1% = (820-120)/80 = 8.75px -->
  <!-- Y-axis: Standard Error (inverted), range 0.0 (top) to 0.50 (bottom) -->
  <!-- y_scale: 1 SE unit = (480-55)/0.50 = 850px -->

  <!-- Axes -->
  <line x1="120" y1="480" x2="820" y2="480" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="120" y1="55" x2="120" y2="480" stroke="#0B3C5D" stroke-width="2"/>

  <!-- X-axis label -->
  <text x="470" y="530" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Hallucination Rate (%)</text>

  <!-- X-axis ticks: 0, 10, 20, 30, 40, 50, 60, 70, 80 -->
  <!-- x = 120 + rate * 8.75 -->
  <line x1="120" y1="480" x2="120" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="120" y="505" text-anchor="middle" font-size="14">0</text>
  <line x1="208" y1="480" x2="208" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="208" y="505" text-anchor="middle" font-size="14">10</text>
  <line x1="295" y1="480" x2="295" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="295" y="505" text-anchor="middle" font-size="14">20</text>
  <line x1="383" y1="480" x2="383" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="383" y="505" text-anchor="middle" font-size="14">30</text>
  <line x1="470" y1="480" x2="470" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="470" y="505" text-anchor="middle" font-size="14">40</text>
  <line x1="558" y1="480" x2="558" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="558" y="505" text-anchor="middle" font-size="14">50</text>
  <line x1="645" y1="480" x2="645" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="645" y="505" text-anchor="middle" font-size="14">60</text>
  <line x1="733" y1="480" x2="733" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="733" y="505" text-anchor="middle" font-size="14">70</text>
  <line x1="820" y1="480" x2="820" y2="488" stroke="#0B3C5D" stroke-width="2"/>
  <text x="820" y="505" text-anchor="middle" font-size="14">80</text>

  <!-- Y-axis label (SE) -->
  <text x="45" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D" transform="rotate(-90, 45, 270)">Standard Error</text>

  <!-- Y-axis ticks: SE 0.0, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50 -->
  <!-- y = 55 + SE * 850 -->
  <line x1="113" y1="55" x2="120" y2="55" stroke="#0B3C5D" stroke-width="2"/>
  <text x="105" y="60" text-anchor="end" font-size="14">0.00</text>
  <line x1="113" y1="140" x2="120" y2="140" stroke="#0B3C5D" stroke-width="2"/>
  <text x="105" y="145" text-anchor="end" font-size="14">0.10</text>
  <line x1="113" y1="225" x2="120" y2="225" stroke="#0B3C5D" stroke-width="2"/>
  <text x="105" y="230" text-anchor="end" font-size="14">0.20</text>
  <line x1="113" y1="310" x2="120" y2="310" stroke="#0B3C5D" stroke-width="2"/>
  <text x="105" y="315" text-anchor="end" font-size="14">0.30</text>
  <line x1="113" y1="395" x2="120" y2="395" stroke="#0B3C5D" stroke-width="2"/>
  <text x="105" y="400" text-anchor="end" font-size="14">0.40</text>
  <line x1="113" y1="480" x2="120" y2="480" stroke="#0B3C5D" stroke-width="2"/>
  <text x="105" y="485" text-anchor="end" font-size="14">0.50</text>

  <!-- Pooled estimate vertical dashed line: 25.0% -->
  <!-- x = 120 + 25 * 8.75 = 339 -->
  <line x1="339" y1="55" x2="339" y2="480" stroke="#E74C3C" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- 95% pseudo-CI funnel lines -->
  <!-- At SE=0: center at 25%, CI = 25% +/- 0 = just the point at top -->
  <!-- At SE=0.50: CI = 25% +/- 1.96*0.50*100/... -->
  <!-- Using proportion scale: at SE s, CI = pooled +/- 1.96*s -->
  <!-- But SE is on logit scale. For simplicity, use approx linear on % scale -->
  <!-- At SE=0: width=0 -> both lines at x=339 -->
  <!-- At SE=0.50: approx +/- 35% -> left=-10%(clamp 0), right=60% -->
  <!-- Left at bottom: x=120+0*8.75=120 (clamp), Right: x=120+60*8.75=645 -->
  <line x1="339" y1="55" x2="120" y2="480" stroke="#0B3C5D" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="339" y1="55" x2="645" y2="480" stroke="#0B3C5D" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- 14 data points from real studies -->
  <!-- x = 120 + rate * 8.75, y = 55 + SE * 850 -->
  <!-- SE approximated from sample sizes / CI widths -->

  <!-- Asgari2025: 1.47%, SE~0.12 -> x=133, y=157 -->
  <circle cx="133" cy="157" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Hasnain2025: 10.0%, SE~0.15 -> x=208, y=183 -->
  <circle cx="208" cy="183" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Yoon2025: 12.47%, SE~0.10 -> x=229, y=140 -->
  <circle cx="229" cy="140" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Moayeri2024: 15.0%, SE~0.15 -> x=251, y=183 -->
  <circle cx="251" cy="183" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Loi2024: 15.8%, SE~0.12 -> x=258, y=157 -->
  <circle cx="258" cy="157" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Molli2026: 26.5%, SE~0.14 -> x=352, y=174 -->
  <circle cx="352" cy="174" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Min2023: 28.4%, SE~0.16 -> x=369, y=191 -->
  <circle cx="369" cy="191" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Gui2025: 28.57%, SE~0.18 -> x=370, y=208 -->
  <circle cx="370" cy="208" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Fernandez2025: 31.0%, SE~0.17 -> x=391, y=200 -->
  <circle cx="391" cy="200" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Li2023: 38.0%, SE~0.18 -> x=453, y=208 -->
  <circle cx="453" cy="208" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Lin2022: 42.0%, SE~0.14 -> x=488, y=174 -->
  <circle cx="488" cy="174" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Semnani2023: 42.9%, SE~0.16 -> x=495, y=191 -->
  <circle cx="495" cy="191" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Athaluri2023: 47.0%, SE~0.15 -> x=531, y=183 -->
  <circle cx="531" cy="183" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Rahman2025: 65.0%, SE~0.20 -> x=689, y=225 -->
  <circle cx="689" cy="225" r="6" fill="#0B3C5D" opacity="0.75"/>

  <!-- Egger's test annotation -->
  <rect x="580" y="60" width="260" height="35" rx="6" ry="6" fill="#FFF3E0" stroke="#FFC857" stroke-width="2"/>
  <text x="710" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B3C5D">Egger's test: p = 0.987</text>

  <!-- Pooled label -->
  <text x="345" y="50" font-size="14" fill="#E74C3C">Pooled = 25.0%</text>

  <!-- Footnote -->
  <text x="450" y="570" text-anchor="middle" font-size="13" font-style="italic" fill="#666666">Note: k = 14 studies with extractable quantitative rates. Values from original published studies.</text>
</svg>