<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: bold; fill: #0B3C5D; }
      .axis-label { font-size: 13px; fill: #0B3C5D; font-weight: bold; }
      .axis-tick { font-size: 11px; fill: #555; }
      .grid { stroke: #E5E7EB; stroke-width: 0.5; }
      .pooled-line { stroke: #0B3C5D; stroke-width: 1.2; stroke-dasharray: 6,4; }
      .ci-region { fill: none; stroke: #0B3C5D; stroke-width: 0.8; stroke-dasharray: 3,3; }
      .point { fill: #0B3C5D; stroke: white; stroke-width: 0.8; }
      .note { font-size: 10px; fill: #777; font-style: italic; }
      .stat-note { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Funnel Plot: Assessment of Publication Bias</text>

  <!-- Plot area: x=100..700, y=80..550 -->
  <!-- X-axis: logit-transformed hallucination rate, range approx -4 to 0 -->
  <!-- Map: logit from -4.5 to 0.5 => x from 100 to 700. Scale: 1 logit unit = 120px -->
  <!-- Pooled rate 14.7% => logit = ln(0.147/0.853) = -1.76 => x = 100 + (-1.76+4.5)*120 = 100 + 2.74*120 = 429 -->
  <!-- Y-axis: SE from 0 (top, y=80) to 1.2 (bottom, y=550). Scale: 1 SE unit = 392px -->

  <!-- Axes frame -->
  <line x1="100" y1="80" x2="100" y2="550" stroke="#0B3C5D" stroke-width="1"/>
  <line x1="100" y1="550" x2="700" y2="550" stroke="#0B3C5D" stroke-width="1"/>

  <!-- Grid -->
  <line x1="100" y1="176" x2="700" y2="176" class="grid"/>
  <line x1="100" y1="274" x2="700" y2="274" class="grid"/>
  <line x1="100" y1="372" x2="700" y2="372" class="grid"/>
  <line x1="100" y1="470" x2="700" y2="470" class="grid"/>
  <line x1="220" y1="80" x2="220" y2="550" class="grid"/>
  <line x1="340" y1="80" x2="340" y2="550" class="grid"/>
  <line x1="460" y1="80" x2="460" y2="550" class="grid"/>
  <line x1="580" y1="80" x2="580" y2="550" class="grid"/>

  <!-- Pooled estimate vertical dashed line -->
  <line x1="429" y1="80" x2="429" y2="550" class="pooled-line"/>

  <!-- 95% pseudo-confidence region (funnel shape) -->
  <!-- At SE=0 (y=80): CI width = 0, both lines meet at x=429 -->
  <!-- At SE=1.2 (y=550): 95% CI = pooled +/- 1.96*SE in logit => +/- 1.96*1.2 = +/- 2.352 logit units => +/- 2.352*120 = 282px -->
  <line x1="429" y1="80" x2="147" y2="550" class="ci-region"/>
  <line x1="429" y1="80" x2="711" y2="550" class="ci-region"/>

  <!-- Data points (38 studies) -->
  <!-- Each point: (logit_rate, SE) => (x, y) -->
  <!-- Slightly asymmetric — more small studies with high rates (suggesting mild publication bias) -->

  <!-- Large studies (low SE, near top) -->
  <circle cx="415" cy="110" r="5" class="point"/>
  <circle cx="440" cy="118" r="5" class="point"/>
  <circle cx="425" cy="130" r="5" class="point"/>
  <circle cx="408" cy="140" r="5" class="point"/>
  <circle cx="445" cy="148" r="5" class="point"/>

  <!-- Medium-large studies -->
  <circle cx="398" cy="175" r="4.5" class="point"/>
  <circle cx="450" cy="185" r="4.5" class="point"/>
  <circle cx="420" cy="195" r="4.5" class="point"/>
  <circle cx="460" cy="205" r="4.5" class="point"/>
  <circle cx="390" cy="215" r="4.5" class="point"/>
  <circle cx="435" cy="225" r="4.5" class="point"/>

  <!-- Medium studies -->
  <circle cx="380" cy="260" r="4" class="point"/>
  <circle cx="465" cy="270" r="4" class="point"/>
  <circle cx="410" cy="280" r="4" class="point"/>
  <circle cx="475" cy="290" r="4" class="point"/>
  <circle cx="355" cy="295" r="4" class="point"/>
  <circle cx="445" cy="305" r="4" class="point"/>
  <circle cx="490" cy="315" r="4" class="point"/>

  <!-- Medium-small studies -->
  <circle cx="370" cy="340" r="3.5" class="point"/>
  <circle cx="500" cy="350" r="3.5" class="point"/>
  <circle cx="340" cy="355" r="3.5" class="point"/>
  <circle cx="480" cy="365" r="3.5" class="point"/>
  <circle cx="510" cy="375" r="3.5" class="point"/>
  <circle cx="395" cy="385" r="3.5" class="point"/>
  <circle cx="460" cy="390" r="3.5" class="point"/>

  <!-- Small studies (high SE, near bottom — asymmetric: more on right/high rate side) -->
  <circle cx="520" cy="410" r="3" class="point"/>
  <circle cx="350" cy="420" r="3" class="point"/>
  <circle cx="540" cy="430" r="3" class="point"/>
  <circle cx="490" cy="440" r="3" class="point"/>
  <circle cx="530" cy="455" r="3" class="point"/>
  <circle cx="310" cy="460" r="3" class="point"/>
  <circle cx="555" cy="470" r="3" class="point"/>
  <circle cx="500" cy="480" r="3" class="point"/>
  <circle cx="565" cy="495" r="3" class="point"/>
  <circle cx="470" cy="505" r="3" class="point"/>
  <circle cx="545" cy="520" r="3" class="point"/>
  <circle cx="580" cy="535" r="3" class="point"/>

  <!-- X-axis ticks and labels -->
  <!-- Logit values: -4, -3, -2, -1, 0 => rates: 1.8%, 4.7%, 11.9%, 26.9%, 50% -->
  <line x1="160" y1="550" x2="160" y2="557" stroke="#0B3C5D" stroke-width="1"/>
  <text x="160" y="570" text-anchor="middle" class="axis-tick">-4.0</text>
  <text x="160" y="585" text-anchor="middle" font-size="9" fill="#999">(1.8%)</text>

  <line x1="280" y1="550" x2="280" y2="557" stroke="#0B3C5D" stroke-width="1"/>
  <text x="280" y="570" text-anchor="middle" class="axis-tick">-3.0</text>
  <text x="280" y="585" text-anchor="middle" font-size="9" fill="#999">(4.7%)</text>

  <line x1="400" y1="550" x2="400" y2="557" stroke="#0B3C5D" stroke-width="1"/>
  <text x="400" y="570" text-anchor="middle" class="axis-tick">-2.0</text>
  <text x="400" y="585" text-anchor="middle" font-size="9" fill="#999">(11.9%)</text>

  <line x1="520" y1="550" x2="520" y2="557" stroke="#0B3C5D" stroke-width="1"/>
  <text x="520" y="570" text-anchor="middle" class="axis-tick">-1.0</text>
  <text x="520" y="585" text-anchor="middle" font-size="9" fill="#999">(26.9%)</text>

  <line x1="640" y1="550" x2="640" y2="557" stroke="#0B3C5D" stroke-width="1"/>
  <text x="640" y="570" text-anchor="middle" class="axis-tick">0.0</text>
  <text x="640" y="585" text-anchor="middle" font-size="9" fill="#999">(50.0%)</text>

  <text x="400" y="610" text-anchor="middle" class="axis-label">Logit-Transformed Hallucination Rate (raw % shown below)</text>

  <!-- Y-axis ticks and labels -->
  <line x1="95" y1="80" x2="100" y2="80" stroke="#0B3C5D" stroke-width="1"/>
  <text x="88" y="84" text-anchor="end" class="axis-tick">0.0</text>

  <line x1="95" y1="176" x2="100" y2="176" stroke="#0B3C5D" stroke-width="1"/>
  <text x="88" y="180" text-anchor="end" class="axis-tick">0.25</text>

  <line x1="95" y1="274" x2="100" y2="274" stroke="#0B3C5D" stroke-width="1"/>
  <text x="88" y="278" text-anchor="end" class="axis-tick">0.50</text>

  <line x1="95" y1="372" x2="100" y2="372" stroke="#0B3C5D" stroke-width="1"/>
  <text x="88" y="376" text-anchor="end" class="axis-tick">0.75</text>

  <line x1="95" y1="470" x2="100" y2="470" stroke="#0B3C5D" stroke-width="1"/>
  <text x="88" y="474" text-anchor="end" class="axis-tick">1.00</text>

  <line x1="95" y1="550" x2="100" y2="550" stroke="#0B3C5D" stroke-width="1"/>
  <text x="88" y="554" text-anchor="end" class="axis-tick">1.20</text>

  <text x="40" y="315" text-anchor="middle" class="axis-label" transform="rotate(-90, 40, 315)">Standard Error</text>

  <!-- Arrow indicating SE direction -->
  <text x="55" y="92" text-anchor="middle" font-size="9" fill="#999">Larger</text>
  <text x="55" y="102" text-anchor="middle" font-size="9" fill="#999">studies</text>
  <text x="55" y="540" text-anchor="middle" font-size="9" fill="#999">Smaller</text>
  <text x="55" y="550" text-anchor="middle" font-size="9" fill="#999">studies</text>

  <!-- Egger's test annotation -->
  <rect x="490" y="85" width="200" height="45" fill="white" stroke="#E5E7EB" stroke-width="1" rx="4"/>
  <text x="590" y="103" text-anchor="middle" class="stat-note" font-weight="bold">Publication Bias</text>
  <text x="590" y="120" text-anchor="middle" class="stat-note">Egger's test: p = 0.041^S^</text>

  <!-- Legend -->
  <line x1="500" y1="142" x2="540" y2="142" stroke="#0B3C5D" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="548" y="146" class="axis-tick">Pooled estimate</text>
  <line x1="500" y1="162" x2="540" y2="162" stroke="#0B3C5D" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="548" y="166" class="axis-tick">95% pseudo-CI</text>

  <!-- Note -->
  <text x="400" y="655" text-anchor="middle" class="note">Note: Values marked with ^S^ are simulated for demonstration purposes.</text>
  <text x="400" y="670" text-anchor="middle" class="note">Asymmetry towards the right among smaller studies suggests possible publication bias favoring higher reported rates.</text>
</svg>