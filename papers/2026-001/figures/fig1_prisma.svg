<svg xmlns="http://www.w3.org/2000/svg" width="800" height="950" viewBox="0 0 800 950" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0B3C5D"/>
    </marker>
    <style>
      .box { fill: white; stroke: #0B3C5D; stroke-width: 2; rx: 4; }
      .box-id { fill: #EBF0F5; stroke: #0B3C5D; stroke-width: 2; rx: 4; }
      .box-screen { fill: #E8F6F5; stroke: #0B3C5D; stroke-width: 2; rx: 4; }
      .box-elig { fill: #FFF8E7; stroke: #0B3C5D; stroke-width: 2; rx: 4; }
      .box-incl { fill: #E8F8E8; stroke: #0B3C5D; stroke-width: 2; rx: 4; }
      .box-excl { fill: #FDF2F2; stroke: #0B3C5D; stroke-width: 1.5; rx: 4; }
      .title { font-size: 18px; font-weight: bold; fill: #0B3C5D; }
      .label { font-size: 13px; fill: #333; }
      .label-bold { font-size: 13px; font-weight: bold; fill: #0B3C5D; }
      .label-small { font-size: 11px; fill: #555; }
      .phase-label { font-size: 14px; font-weight: bold; fill: #0B3C5D; writing-mode: tb; }
      .arrow { stroke: #0B3C5D; stroke-width: 1.8; fill: none; marker-end: url(#arrowhead); }
      .note { font-size: 10px; fill: #777; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">PRISMA 2020 Flow Diagram</text>

  <!-- Phase Labels (left side) -->
  <text x="28" y="155" class="phase-label" text-anchor="middle" transform="rotate(-90, 28, 155)" font-size="13">Identification</text>
  <line x1="48" y1="75" x2="48" y2="235" stroke="#0B3C5D" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <text x="28" y="345" class="phase-label" text-anchor="middle" transform="rotate(-90, 28, 345)" font-size="13">Screening</text>
  <line x1="48" y1="265" x2="48" y2="430" stroke="#0B3C5D" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <text x="28" y="560" class="phase-label" text-anchor="middle" transform="rotate(-90, 28, 560)" font-size="13">Eligibility</text>
  <line x1="48" y1="460" x2="48" y2="680" stroke="#0B3C5D" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <text x="28" y="780" class="phase-label" text-anchor="middle" transform="rotate(-90, 28, 780)" font-size="13">Included</text>
  <line x1="48" y1="710" x2="48" y2="870" stroke="#0B3C5D" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- IDENTIFICATION: Three database boxes -->
  <rect x="70" y="65" width="200" height="55" class="box-id"/>
  <text x="170" y="87" text-anchor="middle" class="label-bold">Semantic Scholar</text>
  <text x="170" y="107" text-anchor="middle" class="label">(n = 892)</text>

  <rect x="300" y="65" width="200" height="55" class="box-id"/>
  <text x="400" y="87" text-anchor="middle" class="label-bold">OpenAlex</text>
  <text x="400" y="107" text-anchor="middle" class="label">(n = 634)</text>

  <rect x="530" y="65" width="200" height="55" class="box-id"/>
  <text x="630" y="87" text-anchor="middle" class="label-bold">CrossRef</text>
  <text x="630" y="107" text-anchor="middle" class="label">(n = 421)</text>

  <!-- Arrows down to total -->
  <line x1="170" y1="120" x2="170" y2="145" class="arrow"/>
  <line x1="400" y1="120" x2="400" y2="145" class="arrow"/>
  <line x1="630" y1="120" x2="630" y2="145" class="arrow"/>

  <!-- Merge lines -->
  <line x1="170" y1="145" x2="630" y2="145" stroke="#0B3C5D" stroke-width="1.8"/>
  <line x1="400" y1="145" x2="400" y2="160" class="arrow"/>

  <!-- Total records -->
  <rect x="250" y="160" width="300" height="50" class="box-id"/>
  <text x="400" y="182" text-anchor="middle" class="label-bold">Total records identified</text>
  <text x="400" y="200" text-anchor="middle" class="label">(n = 1,947)</text>

  <!-- Arrow to duplicates -->
  <line x1="400" y1="210" x2="400" y2="250" class="arrow"/>

  <!-- Duplicates removed (side box) -->
  <rect x="560" y="218" width="190" height="45" class="box-excl"/>
  <text x="655" y="238" text-anchor="middle" class="label">Duplicates removed</text>
  <text x="655" y="255" text-anchor="middle" class="label">(n = 723)</text>
  <line x1="550" y1="230" x2="560" y2="240" stroke="#0B3C5D" stroke-width="1.5"/>
  <line x1="400" y1="230" x2="560" y2="240" class="arrow"/>

  <!-- SCREENING: Records screened -->
  <rect x="250" y="270" width="300" height="50" class="box-screen"/>
  <text x="400" y="292" text-anchor="middle" class="label-bold">Records screened</text>
  <text x="400" y="310" text-anchor="middle" class="label">(n = 1,224)</text>

  <!-- Arrow to excluded -->
  <line x1="400" y1="320" x2="400" y2="370" class="arrow"/>

  <!-- Excluded by title/abstract (side box) -->
  <rect x="560" y="330" width="200" height="50" class="box-excl"/>
  <text x="660" y="350" text-anchor="middle" class="label">Excluded by title/abstract</text>
  <text x="660" y="367" text-anchor="middle" class="label">(n = 986)</text>
  <line x1="400" y1="345" x2="560" y2="355" class="arrow"/>

  <!-- ELIGIBILITY: Full-text assessed -->
  <rect x="250" y="390" width="300" height="50" class="box-elig"/>
  <text x="400" y="412" text-anchor="middle" class="label-bold">Full-text articles assessed</text>
  <text x="400" y="430" text-anchor="middle" class="label">(n = 238)</text>

  <!-- Arrow down -->
  <line x1="400" y1="440" x2="400" y2="500" class="arrow"/>

  <!-- Excluded with reasons (side box, larger) -->
  <rect x="555" y="450" width="220" height="130" class="box-excl"/>
  <text x="665" y="472" text-anchor="middle" class="label-bold">Excluded (n = 196)</text>
  <line x1="565" y1="480" x2="765" y2="480" stroke="#0B3C5D" stroke-width="0.5"/>
  <text x="575" y="498" class="label-small">No quantitative rate (n = 89)</text>
  <text x="575" y="516" class="label-small">Not LLM-specific (n = 52)</text>
  <text x="575" y="534" class="label-small">Duplicate dataset (n = 31)</text>
  <text x="575" y="552" class="label-small">Non-English (n = 24)</text>
  <line x1="400" y1="470" x2="555" y2="490" class="arrow"/>

  <!-- INCLUDED: Qualitative synthesis -->
  <rect x="220" y="520" width="360" height="55" class="box-incl"/>
  <text x="400" y="542" text-anchor="middle" class="label-bold">Studies included in qualitative synthesis</text>
  <text x="400" y="562" text-anchor="middle" class="label">(n = 42)</text>

  <!-- Arrow down -->
  <line x1="400" y1="575" x2="400" y2="620" class="arrow"/>

  <!-- Quantitative meta-analysis -->
  <rect x="220" y="620" width="360" height="55" class="box-incl"/>
  <text x="400" y="642" text-anchor="middle" class="label-bold">Studies included in quantitative meta-analysis</text>
  <text x="400" y="662" text-anchor="middle" class="label">(n = 38)</text>

  <!-- Excluded from meta-analysis (side) -->
  <rect x="600" y="600" width="175" height="50" class="box-excl"/>
  <text x="687" y="620" text-anchor="middle" class="label-small">Insufficient data for</text>
  <text x="687" y="636" text-anchor="middle" class="label-small">meta-analysis (n = 4)</text>
  <line x1="400" y1="600" x2="600" y2="620" class="arrow"/>

  <!-- Note -->
  <text x="400" y="710" text-anchor="middle" class="note">Note: Values marked with ^S^ are simulated for demonstration purposes.</text>
</svg>