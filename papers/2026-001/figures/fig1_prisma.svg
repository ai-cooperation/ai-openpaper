<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0B3C5D"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="white"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#0B3C5D">Figure 1. PRISMA 2020 Flow Diagram</text>

  <!-- === IDENTIFICATION ROW === -->
  <!-- Section label -->
  <text x="22" y="100" font-size="14" font-weight="bold" fill="#0B3C5D" transform="rotate(-90, 22, 100)">Identification</text>

  <!-- S2 box -->
  <rect x="80" y="55" width="200" height="60" rx="8" ry="8" fill="white" stroke="#0B3C5D" stroke-width="2"/>
  <text x="180" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Semantic Scholar</text>
  <text x="180" y="102" text-anchor="middle" font-size="14">(n = 892)</text>

  <!-- OpenAlex box -->
  <rect x="350" y="55" width="200" height="60" rx="8" ry="8" fill="white" stroke="#0B3C5D" stroke-width="2"/>
  <text x="450" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">OpenAlex</text>
  <text x="450" y="102" text-anchor="middle" font-size="14">(n = 634)</text>

  <!-- CrossRef box -->
  <rect x="620" y="55" width="200" height="60" rx="8" ry="8" fill="white" stroke="#0B3C5D" stroke-width="2"/>
  <text x="720" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">CrossRef</text>
  <text x="720" y="102" text-anchor="middle" font-size="14">(n = 421)</text>

  <!-- Arrows from 3 sources down to merge -->
  <line x1="180" y1="115" x2="180" y2="140" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="450" y1="115" x2="450" y2="140" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="720" y1="115" x2="720" y2="140" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="180" y1="140" x2="720" y2="140" stroke="#0B3C5D" stroke-width="2"/>
  <line x1="450" y1="140" x2="450" y2="158" stroke="#0B3C5D" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Total identified -->
  <rect x="300" y="163" width="300" height="55" rx="8" ry="8" fill="#EBF4FA" stroke="#0B3C5D" stroke-width="2"/>
  <text x="450" y="186" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Records Identified</text>
  <text x="450" y="207" text-anchor="middle" font-size="14">(N = 1,947)</text>

  <!-- Arrow down -->
  <line x1="450" y1="218" x2="450" y2="245" stroke="#0B3C5D" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Duplicates removed (side) -->
  <rect x="610" y="228" width="250" height="50" rx="8" ry="8" fill="#FFF3E0" stroke="#FFC857" stroke-width="2"/>
  <text x="735" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B3C5D">Duplicates Removed</text>
  <text x="735" y="270" text-anchor="middle" font-size="14">(n = 723)</text>
  <line x1="550" y1="255" x2="605" y2="255" stroke="#FFC857" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- === SCREENING ROW === -->
  <text x="22" y="325" font-size="14" font-weight="bold" fill="#0B3C5D" transform="rotate(-90, 22, 325)">Screening</text>

  <line x1="450" y1="265" x2="450" y2="290" stroke="#0B3C5D" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="300" y="295" width="300" height="55" rx="8" ry="8" fill="white" stroke="#0B3C5D" stroke-width="2"/>
  <text x="450" y="318" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Records Screened</text>
  <text x="450" y="339" text-anchor="middle" font-size="14">(n = 1,224)</text>

  <rect x="610" y="298" width="250" height="48" rx="8" ry="8" fill="#FFF3E0" stroke="#FFC857" stroke-width="2"/>
  <text x="735" y="327" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B3C5D">Excluded (n = 986)</text>
  <line x1="550" y1="322" x2="605" y2="322" stroke="#FFC857" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- === ELIGIBILITY ROW === -->
  <text x="22" y="435" font-size="14" font-weight="bold" fill="#0B3C5D" transform="rotate(-90, 22, 435)">Eligibility</text>

  <line x1="450" y1="350" x2="450" y2="378" stroke="#0B3C5D" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="300" y="383" width="300" height="55" rx="8" ry="8" fill="white" stroke="#0B3C5D" stroke-width="2"/>
  <text x="450" y="406" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Full-Text Assessed</text>
  <text x="450" y="427" text-anchor="middle" font-size="14">(n = 238)</text>

  <!-- Excluded with reasons -->
  <rect x="610" y="370" width="270" height="110" rx="8" ry="8" fill="#FFF3E0" stroke="#FFC857" stroke-width="2"/>
  <text x="745" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#0B3C5D">Excluded (n = 196)</text>
  <text x="625" y="414" font-size="14" fill="#1a1a1a">No quant. rate (n = 89)</text>
  <text x="625" y="434" font-size="14" fill="#1a1a1a">Not LLM-specific (n = 52)</text>
  <text x="625" y="454" font-size="14" fill="#1a1a1a">Duplicate data (n = 31)</text>
  <text x="625" y="474" font-size="14" fill="#1a1a1a">Non-English (n = 24)</text>
  <line x1="550" y1="410" x2="605" y2="410" stroke="#FFC857" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- === INCLUDED ROW === -->
  <text x="22" y="565" font-size="14" font-weight="bold" fill="#0B3C5D" transform="rotate(-90, 22, 565)">Included</text>

  <line x1="450" y1="438" x2="450" y2="508" stroke="#0B3C5D" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Qualitative synthesis -->
  <rect x="300" y="513" width="300" height="55" rx="8" ry="8" fill="#E8F5E9" stroke="#0F9D8A" stroke-width="2"/>
  <text x="450" y="536" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Qualitative Synthesis</text>
  <text x="450" y="557" text-anchor="middle" font-size="14">(n = 42)</text>

  <line x1="450" y1="568" x2="450" y2="596" stroke="#0B3C5D" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Quantitative meta-analysis -->
  <rect x="275" y="601" width="350" height="58" rx="8" ry="8" fill="#E8F5E9" stroke="#0F9D8A" stroke-width="2.5"/>
  <text x="450" y="625" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Quantitative Meta-Analysis</text>
  <text x="450" y="647" text-anchor="middle" font-size="14">(n = 38)</text>

  <!-- Footnote -->
  <text x="450" y="688" text-anchor="middle" font-size="13" font-style="italic" fill="#666">Note: Aggregated values are simulated (^S) for demonstration.</text>
</svg>
