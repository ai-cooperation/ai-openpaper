<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0B3C5D">Figure 3. Subgroup Analysis: Hallucination Rates by Domain</text>

  <!-- Chart area: bars from x=250 to x=830, y=55 to y=310 -->
  <!-- X-axis: 0% to 60%, Scale: 1% = (830-250)/60 = 9.67px -->

  <!-- Gridlines -->
  <line x1="250" y1="50" x2="250" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="347" y1="50" x2="347" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="443" y1="50" x2="443" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="540" y1="50" x2="540" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="637" y1="50" x2="637" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="733" y1="50" x2="733" y2="310" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="830" y1="50" x2="830" y2="310" stroke="#E5E7EB" stroke-width="1"/>

  <!-- X-axis tick labels -->
  <text x="250" y="332" text-anchor="middle" font-size="14">0</text>
  <text x="347" y="332" text-anchor="middle" font-size="14">10</text>
  <text x="443" y="332" text-anchor="middle" font-size="14">20</text>
  <text x="540" y="332" text-anchor="middle" font-size="14">30</text>
  <text x="637" y="332" text-anchor="middle" font-size="14">40</text>
  <text x="733" y="332" text-anchor="middle" font-size="14">50</text>
  <text x="830" y="332" text-anchor="middle" font-size="14">60</text>

  <!-- X-axis label -->
  <text x="540" y="355" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Hallucination Rate (%)</text>

  <!-- 4 bars, height=50, gap=15, starting at y=60 -->
  <!-- Scale: 1% = 9.67px -->

  <!-- Bar 1: Medical: 10.3% (k=5) — color #E74C3C -->
  <text x="240" y="88" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">Medical</text>
  <text x="240" y="104" text-anchor="end" font-size="14" fill="#666666">(k = 5)</text>
  <rect x="250" y="70" width="100" height="40" rx="4" ry="4" fill="#E74C3C"/>
  <!-- CI: approx [5.2, 19.5] -->
  <line x1="300" y1="90" x2="439" y2="90" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="83" x2="300" y2="97" stroke="#333" stroke-width="2"/>
  <line x1="439" y1="83" x2="439" y2="97" stroke="#333" stroke-width="2"/>
  <text x="360" y="95" font-size="14" font-weight="bold" fill="#1a1a1a">10.3%</text>

  <!-- Bar 2: Legal: 28.6% (k=1) — color #9B59B6 -->
  <text x="240" y="153" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">Legal</text>
  <text x="240" y="169" text-anchor="end" font-size="14" fill="#666666">(k = 1)</text>
  <rect x="250" y="135" width="277" height="40" rx="4" ry="4" fill="#9B59B6"/>
  <text x="537" y="160" font-size="14" font-weight="bold" fill="#1a1a1a">28.6%</text>

  <!-- Bar 3: General: 37.6% (k=7) — color #95A5A6 -->
  <text x="240" y="218" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">General</text>
  <text x="240" y="234" text-anchor="end" font-size="14" fill="#666666">(k = 7)</text>
  <rect x="250" y="200" width="364" height="40" rx="4" ry="4" fill="#95A5A6"/>
  <!-- CI: approx [25.0, 52.0] -->
  <line x1="492" y1="220" x2="753" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="492" y1="213" x2="492" y2="227" stroke="#333" stroke-width="2"/>
  <line x1="753" y1="213" x2="753" y2="227" stroke="#333" stroke-width="2"/>
  <text x="624" y="225" font-size="14" font-weight="bold" fill="white">37.6%</text>

  <!-- Bar 4: Sci. Writing: 47.0% (k=1) — color #3498DB -->
  <text x="240" y="283" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">Sci. Writing</text>
  <text x="240" y="299" text-anchor="end" font-size="14" fill="#666666">(k = 1)</text>
  <rect x="250" y="265" width="455" height="40" rx="4" ry="4" fill="#3498DB"/>
  <text x="715" y="290" font-size="14" font-weight="bold" fill="#1a1a1a">47.0%</text>

  <!-- X-axis bottom line -->
  <line x1="250" y1="310" x2="830" y2="310" stroke="#0B3C5D" stroke-width="2"/>

  <!-- Footnote -->
  <text x="450" y="388" text-anchor="middle" font-size="13" font-style="italic" fill="#666666">Note: k = 14 studies with extractable quantitative rates. Values from original published studies.</text>
</svg>