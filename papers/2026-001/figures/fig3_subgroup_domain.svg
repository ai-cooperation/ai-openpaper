<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="white"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#0B3C5D">Figure 3. Subgroup Analysis by Domain</text>

  <!-- Chart area: bars from x=250 to x=830, y=60 to y=420 -->
  <!-- Y-axis labels (domain names) -->
  <!-- X-axis: 0% to 35%, gridlines every 5% -->
  <!-- Scale: 1% = (830-250)/35 = 16.57px -->

  <!-- Gridlines -->
  <line x1="250" y1="60" x2="250" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="333" y1="60" x2="333" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="416" y1="60" x2="416" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="499" y1="60" x2="499" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="582" y1="60" x2="582" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="665" y1="60" x2="665" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="748" y1="60" x2="748" y2="420" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="830" y1="60" x2="830" y2="420" stroke="#E5E7EB" stroke-width="1"/>

  <!-- X-axis tick labels -->
  <text x="250" y="445" text-anchor="middle" font-size="14">0</text>
  <text x="333" y="445" text-anchor="middle" font-size="14">5</text>
  <text x="416" y="445" text-anchor="middle" font-size="14">10</text>
  <text x="499" y="445" text-anchor="middle" font-size="14">15</text>
  <text x="582" y="445" text-anchor="middle" font-size="14">20</text>
  <text x="665" y="445" text-anchor="middle" font-size="14">25</text>
  <text x="748" y="445" text-anchor="middle" font-size="14">30</text>
  <text x="830" y="445" text-anchor="middle" font-size="14">35</text>

  <!-- X-axis label -->
  <text x="540" y="470" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Hallucination Rate (%)</text>

  <!-- Bar height=50, gap=20, 5 bars starting at y=75 -->

  <!-- Bar 1: Summarization 8.4% [4.1, 16.5], k=5 -->
  <text x="240" y="107" text-anchor="end" font-size="16" font-weight="bold" fill="#0B3C5D">Summarization</text>
  <text x="240" y="125" text-anchor="end" font-size="14" fill="#666">(k = 5)</text>
  <rect x="250" y="85" width="139" height="50" rx="4" ry="4" fill="#95A5A6"/>
  <!-- CI line: 4.1% to 16.5% -->
  <line x1="318" y1="110" x2="523" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="318" y1="102" x2="318" y2="118" stroke="#333" stroke-width="2"/>
  <line x1="523" y1="102" x2="523" y2="118" stroke="#333" stroke-width="2"/>
  <text x="395" y="107" font-size="14" font-weight="bold" fill="white">8.4%</text>

  <!-- Bar 2: General QA 11.2% [7.8, 15.9], k=12 -->
  <text x="240" y="177" text-anchor="end" font-size="16" font-weight="bold" fill="#0B3C5D">General QA</text>
  <text x="240" y="195" text-anchor="end" font-size="14" fill="#666">(k = 12)</text>
  <rect x="250" y="155" width="186" height="50" rx="4" ry="4" fill="#95A5A6"/>
  <line x1="379" y1="180" x2="513" y2="180" stroke="#333" stroke-width="2"/>
  <line x1="379" y1="172" x2="379" y2="188" stroke="#333" stroke-width="2"/>
  <line x1="513" y1="172" x2="513" y2="188" stroke="#333" stroke-width="2"/>
  <text x="420" y="177" font-size="14" font-weight="bold" fill="white">11.2%</text>

  <!-- Bar 3: Medical 15.8% [10.2, 23.1], k=14 -->
  <text x="240" y="247" text-anchor="end" font-size="16" font-weight="bold" fill="#0B3C5D">Medical</text>
  <text x="240" y="265" text-anchor="end" font-size="14" fill="#666">(k = 14)</text>
  <rect x="250" y="225" width="262" height="50" rx="4" ry="4" fill="#E74C3C"/>
  <line x1="419" y1="250" x2="633" y2="250" stroke="#333" stroke-width="2"/>
  <line x1="419" y1="242" x2="419" y2="258" stroke="#333" stroke-width="2"/>
  <line x1="633" y1="242" x2="633" y2="258" stroke="#333" stroke-width="2"/>
  <text x="460" y="257" font-size="14" font-weight="bold" fill="white">15.8%</text>

  <!-- Bar 4: Scientific 18.7% [11.3, 29.2], k=3 -->
  <text x="240" y="317" text-anchor="end" font-size="16" font-weight="bold" fill="#0B3C5D">Scientific</text>
  <text x="240" y="335" text-anchor="end" font-size="14" fill="#666">(k = 3)</text>
  <rect x="250" y="295" width="310" height="50" rx="4" ry="4" fill="#3498DB"/>
  <line x1="437" y1="320" x2="734" y2="320" stroke="#333" stroke-width="2"/>
  <line x1="437" y1="312" x2="437" y2="328" stroke="#333" stroke-width="2"/>
  <line x1="734" y1="312" x2="734" y2="328" stroke="#333" stroke-width="2"/>
  <text x="480" y="327" font-size="14" font-weight="bold" fill="white">18.7%</text>

  <!-- Bar 5: Legal 19.3% [12.4, 28.6], k=4 -->
  <text x="240" y="387" text-anchor="end" font-size="16" font-weight="bold" fill="#0B3C5D">Legal</text>
  <text x="240" y="405" text-anchor="end" font-size="14" fill="#666">(k = 4)</text>
  <rect x="250" y="365" width="320" height="50" rx="4" ry="4" fill="#9B59B6"/>
  <line x1="455" y1="390" x2="724" y2="390" stroke="#333" stroke-width="2"/>
  <line x1="455" y1="382" x2="455" y2="398" stroke="#333" stroke-width="2"/>
  <line x1="724" y1="382" x2="724" y2="398" stroke="#333" stroke-width="2"/>
  <text x="490" y="397" font-size="14" font-weight="bold" fill="white">19.3%</text>

  <!-- Footnote -->
  <text x="450" y="495" text-anchor="middle" font-size="13" font-style="italic" fill="#666">Note: Aggregated values are simulated (^S) for demonstration.</text>
</svg>
