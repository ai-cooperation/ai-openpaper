<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0B3C5D">Figure 4. Hallucination Rates by LLM Model Family</text>

  <!-- Chart area: bars from x=280 to x=830, y=50 to y=330 -->
  <!-- X-axis: 0% to 40%, Scale: 1% = (830-280)/40 = 13.75px -->

  <!-- Gridlines -->
  <line x1="280" y1="45" x2="280" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="349" y1="45" x2="349" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="418" y1="45" x2="418" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="486" y1="45" x2="486" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="555" y1="45" x2="555" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="624" y1="45" x2="624" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="693" y1="45" x2="693" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="761" y1="45" x2="761" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="830" y1="45" x2="830" y2="330" stroke="#E5E7EB" stroke-width="1"/>

  <!-- X-axis tick labels -->
  <text x="280" y="350" text-anchor="middle" font-size="14">0</text>
  <text x="349" y="350" text-anchor="middle" font-size="14">5</text>
  <text x="418" y="350" text-anchor="middle" font-size="14">10</text>
  <text x="486" y="350" text-anchor="middle" font-size="14">15</text>
  <text x="555" y="350" text-anchor="middle" font-size="14">20</text>
  <text x="624" y="350" text-anchor="middle" font-size="14">25</text>
  <text x="693" y="350" text-anchor="middle" font-size="14">30</text>
  <text x="761" y="350" text-anchor="middle" font-size="14">35</text>
  <text x="830" y="350" text-anchor="middle" font-size="14">40</text>

  <!-- X-axis label -->
  <text x="555" y="375" text-anchor="middle" font-size="16" font-weight="bold" fill="#0B3C5D">Hallucination Rate (%)</text>

  <!-- 7 bars sorted ascending, height=34, gap=6, starting y=52 -->
  <!-- Teal-to-red gradient based on rate -->

  <!-- Bar 1: Claude ~0% (Hasnain2025) — deep teal -->
  <text x="270" y="75" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">Claude</text>
  <rect x="280" y="56" width="3" height="34" rx="2" ry="2" fill="#0F9D8A"/>
  <text x="290" y="78" font-size="14" font-weight="bold" fill="#0F9D8A">~0%</text>

  <!-- Bar 2: DeepSeek 7% (Hasnain2025) — teal -->
  <text x="270" y="115" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">DeepSeek</text>
  <rect x="280" y="96" width="96" height="34" rx="4" ry="4" fill="#11B89A"/>
  <text x="384" y="118" font-size="14" font-weight="bold" fill="#1a1a1a">7.0%</text>

  <!-- Bar 3: GPT-4 avg ~12.2% (Yoon 8.55%, Loi 15.8%) — green-teal -->
  <text x="270" y="155" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">GPT-4</text>
  <rect x="280" y="136" width="168" height="34" rx="4" ry="4" fill="#2ECC71"/>
  <text x="456" y="158" font-size="14" font-weight="bold" fill="#1a1a1a">12.2%</text>

  <!-- Bar 4: ChatGPT (unspec) 13% (Hasnain2025) — yellow-green -->
  <text x="270" y="195" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">ChatGPT (unspec.)</text>
  <rect x="280" y="176" width="179" height="34" rx="4" ry="4" fill="#7ACC57"/>
  <text x="467" y="198" font-size="14" font-weight="bold" fill="#1a1a1a">13.0%</text>

  <!-- Bar 5: GPT-3.5 15.35% (Yoon2025) — gold -->
  <text x="270" y="235" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">GPT-3.5</text>
  <rect x="280" y="216" width="211" height="34" rx="4" ry="4" fill="#FFC857"/>
  <text x="499" y="238" font-size="14" font-weight="bold" fill="#1a1a1a">15.35%</text>

  <!-- Bar 6: LLaMA-3.3-70B 31% (Fernandez2025) — orange -->
  <text x="270" y="275" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">LLaMA-3.3-70B</text>
  <rect x="280" y="256" width="426" height="34" rx="4" ry="4" fill="#E8943A"/>
  <text x="714" y="278" font-size="14" font-weight="bold" fill="#1a1a1a">31.0%</text>

  <!-- Bar 7: Mistral 8x7B 34.2% (Molli2026) — red-orange -->
  <text x="270" y="315" text-anchor="end" font-size="14" font-weight="bold" fill="#0B3C5D">Mistral 8x7B</text>
  <rect x="280" y="296" width="470" height="34" rx="4" ry="4" fill="#E74C3C"/>
  <text x="758" y="318" font-size="14" font-weight="bold" fill="#1a1a1a">34.2%</text>

  <!-- X-axis bottom line -->
  <line x1="280" y1="330" x2="830" y2="330" stroke="#0B3C5D" stroke-width="2"/>

  <!-- Footnote -->
  <text x="450" y="395" text-anchor="middle" font-size="13" font-style="italic" fill="#666666">Note: k = 14 studies with extractable quantitative rates. Values from original published studies.</text>
</svg>